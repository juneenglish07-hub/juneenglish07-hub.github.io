<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuneEnglish - 词汇学习系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body { background-color: #f3f4f6; padding-bottom: 90px; }
        @media (min-width: 768px) { body { padding-bottom: 0; padding-top: 20px; } }
        .rank-gold { background: linear-gradient(135deg, #fde68a 0%, #fbbf24 100%); }
    </style>
</head>
<body>

    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xs opacity-80">当前进度</span>
                <span class="font-bold text-lg"><i class="fas fa-star text-yellow-300"></i> <span id="display-points">0</span> pts</span>
            </div>
            <nav class="hidden md:flex gap-6">
                <button onclick="showPage('main')" class="hover:text-blue-200">LEARNING</button>
                <button onclick="showPage('ranking')" class="hover:text-blue-200">RANKING</button>
                <button onclick="showPage('account')" class="hover:text-blue-200">ACCOUNT</button>
            </nav>
        </div>
    </header>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-3 z-50 md:hidden shadow-lg">
        <button onclick="showPage('main')" id="nav-main" class="flex flex-col items-center text-blue-600 transition">
            <i class="fas fa-book text-xl"></i><span class="text-[10px] mt-1 font-bold">LEARNING</span>
        </button>
        <button onclick="showPage('ranking')" id="nav-ranking" class="flex flex-col items-center text-gray-400 transition">
            <i class="fas fa-trophy text-xl"></i><span class="text-[10px] mt-1 font-bold">RANKING</span>
        </button>
        <button onclick="showPage('account')" id="nav-account" class="flex flex-col items-center text-gray-400 transition">
            <i class="fas fa-user-circle text-xl"></i><span class="text-[10px] mt-1 font-bold">ACCOUNT</span>
        </button>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        
        <section id="main-page" class="page active space-y-6">
            <div id="level-selector" class="grid grid-cols-3 gap-3">
                <button onclick="startQuiz('A1')" class="bg-white border-2 border-blue-500 text-blue-500 py-4 rounded-2xl font-black shadow-sm">A1</button>
                <button onclick="startQuiz('A2')" class="bg-white border-2 border-blue-500 text-blue-500 py-4 rounded-2xl font-black shadow-sm">A2</button>
                <button onclick="startQuiz('B1')" class="bg-white border-2 border-blue-500 text-blue-500 py-4 rounded-2xl font-black shadow-sm">B1</button>
                <button onclick="startQuiz('B2')" class="bg-white border-2 border-blue-500 text-blue-500 py-4 rounded-2xl font-black shadow-sm">B2</button>
                <button onclick="startQuiz('C1')" class="bg-white border-2 border-blue-500 text-blue-500 py-4 rounded-2xl font-black shadow-sm">C1</button>
                <button onclick="startQuiz('C2')" class="bg-white border-2 border-blue-500 text-blue-500 py-4 rounded-2xl font-black shadow-sm">C2</button>
            </div>

            <div id="quiz-area" class="hidden glass-card p-6 rounded-3xl shadow-xl border">
                <div class="flex justify-between items-center mb-6">
                    <span id="quiz-level-tag" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase">Level</span>
                    <span id="progress-percent" class="text-sm font-bold text-gray-400">掌握度: 0%</span>
                </div>
                <div class="text-center mb-8">
                    <h1 id="question-word" class="text-4xl font-black text-gray-800 tracking-tight">---</h1>
                    <p class="text-gray-400 mt-2 text-sm">选择正确选项：</p>
                </div>
                <div id="options-grid" class="grid grid-cols-1 gap-3"></div>
                <div class="mt-6 pt-4 border-t border-dashed flex flex-col gap-2">
                    <button onclick="handleAnswer(null)" class="w-full py-3 bg-gray-100 text-gray-500 rounded-xl italic">跳过 (+0 pts)</button>
                    <button onclick="exitQuiz()" class="text-center text-red-400 text-sm py-2">退出练习</button>
                </div>
            </div>
        </section>

        <section id="ranking-page" class="page space-y-4">
            <div class="glass-card p-6 rounded-3xl shadow-md border">
                <div class="flex justify-around mb-6 border-b pb-2">
                    <button onclick="switchRank('world')" id="tab-world" class="pb-2 px-4 border-b-2 border-blue-600 font-bold text-blue-600">世界排名</button>
                    <button onclick="switchRank('friends')" id="tab-friends" class="pb-2 px-4 border-b-2 border-transparent text-gray-400 font-bold">好友动态</button>
                </div>

                <div id="rank-content" class="space-y-3">
                    <div class="text-center py-10 text-gray-400">正在加载排行...</div>
                </div>

                <div id="my-rank-pos" class="mt-6 pt-4 border-t hidden">
                    <div class="bg-blue-50 p-4 rounded-2xl flex justify-between items-center">
                        <span class="font-bold text-blue-600">我的实时名次:</span>
                        <span id="my-pts-display" class="font-black text-blue-800">--- pts</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="account-page" class="page space-y-4">
            <div id="auth-box" class="glass-card p-8 rounded-3xl shadow-lg border">
                <h2 class="text-2xl font-bold mb-6 text-center">用户登录</h2>
                <div class="space-y-4">
                    <input type="email" id="email" placeholder="邮箱" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="password" id="password" placeholder="密码" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                    <div class="flex gap-2">
                        <button id="btn-login" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold">登录</button>
                        <button id="btn-register" class="flex-1 bg-gray-800 text-white py-4 rounded-xl font-bold">注册</button>
                    </div>
                </div>
            </div>

            <div id="profile-box" class="hidden space-y-4">
                <div class="glass-card p-6 rounded-3xl shadow-sm border flex items-center justify-between">
                    <div>
                        <h2 id="user-name" class="text-xl font-bold">---</h2>
                        <p id="user-id" class="text-blue-500 font-mono text-sm">ID: #000000</p>
                    </div>
                    <button id="btn-logout" class="text-gray-400 hover:text-red-500 text-xl"><i class="fas fa-power-off"></i></button>
                </div>
                
                <div class="glass-card p-6 rounded-3xl shadow-sm border">
                    <h3 class="font-bold mb-3 text-sm">语言设置</h3>
                    <select id="lang-setting" class="w-full p-3 bg-gray-50 border rounded-xl">
                        <option value="cn">中文 (CN)</option>
                        <option value="ms">Malay (MS)</option>
                    </select>
                </div>

                <div class="glass-card p-6 rounded-3xl border">
                    <h3 class="font-bold mb-3 text-sm">社交</h3>
                    <div class="flex gap-2">
                        <input type="text" id="search-friend" placeholder="输入ID搜索用户" class="flex-1 p-3 bg-gray-50 border rounded-xl text-sm">
                        <button id="btn-search" class="bg-blue-600 text-white px-5 rounded-xl text-sm font-bold">搜索</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP83fCrgigdbGuBZaUdken3C98ite_VVI",
            authDomain: "juneenglish07-4fe11.firebaseapp.com",
            projectId: "juneenglish07-4fe11",
            storageBucket: "juneenglish07-4fe11.firebasestorage.app",
            messagingSenderId: "186169420975",
            appId: "1:186169420975:web:c3a29d1449a9920d9b785a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userData = null;
        let pool = [];
        let currentLang = "cn";

        // 导航切换
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id + '-page').classList.add('active');
            
            // 底部图标激活状态
            const iconIds = ['nav-main', 'nav-ranking', 'nav-account'];
            iconIds.forEach(iconId => {
                const el = document.getElementById(iconId);
                if(iconId.includes(id)) {
                    el.classList.add('text-blue-600'); el.classList.remove('text-gray-400');
                } else {
                    el.classList.remove('text-blue-600'); el.classList.add('text-gray-400');
                }
            });

            if(id === 'ranking') loadWorldRanking();
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "users", user.uid);
                let snap = await getDoc(docRef);
                if (!snap.exists()) {
                    userData = { uid: user.uid, id: Math.floor(100000+Math.random()*900000), name: user.email.split('@')[0], points: 0, lang: "cn" };
                    await setDoc(docRef, userData);
                } else {
                    userData = snap.data();
                }
                currentLang = userData.lang || "cn";
                document.getElementById('display-points').innerText = userData.points;
                document.getElementById('user-name').innerText = userData.name;
                document.getElementById('user-id').innerText = `ID: #${userData.id}`;
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('profile-box').classList.remove('hidden');
            } else {
                document.getElementById('auth-box').classList.remove('hidden');
                document.getElementById('profile-box').classList.add('hidden');
                document.getElementById('display-points').innerText = "0";
            }
        });

        // 测验逻辑
        window.startQuiz = async (lvl) => {
            // 修正后的 GitHub URL
            const url = `https://juneenglish07-hub.github.io/juneenglish07-hub.github.io/${lvl}.json`;
            try {
                const res = await fetch(url);
                pool = await res.json();
                document.getElementById('level-selector').classList.add('hidden');
                document.getElementById('quiz-area').classList.remove('hidden');
                document.getElementById('quiz-level-tag').innerText = lvl;
                loadQuestion();
            } catch (e) {
                alert("词库加载失败，请检查网络或路径: " + url);
            }
        };

        function loadQuestion() {
            const target = pool[Math.floor(Math.random() * pool.length)];
            document.getElementById('question-word').innerText = target.en;
            const getT = (o) => currentLang === 'cn' ? o.cn : o.ms;
            let opts = [{ text: getT(target), correct: true }];
            while(opts.length < 4) {
                let r = pool[Math.floor(Math.random()*pool.length)];
                if(!opts.find(o => o.text === getT(r))) opts.push({ text: getT(r), correct: false });
            }
            opts.sort(() => Math.random() - 0.5);
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "w-full p-4 bg-white border-2 border-gray-100 rounded-2xl text-left hover:border-blue-500 font-medium active:scale-95 transition shadow-sm";
                b.innerText = o.text;
                b.onclick = () => handleAnswer(o.correct);
                grid.appendChild(b);
            });
        }

        window.handleAnswer = async (correct) => {
            let score = correct === true ? 5 : (correct === false ? -2 : 0);
            if(auth.currentUser) {
                const userRef = doc(db, "users", auth.currentUser.uid);
                await updateDoc(userRef, { points: increment(score) });
                userData.points += score;
                document.getElementById('display-points').innerText = userData.points;
            }
            loadQuestion();
        };

        window.exitQuiz = () => {
            document.getElementById('level-selector').classList.remove('hidden');
            document.getElementById('quiz-area').classList.add('hidden');
        };

        // 排行榜逻辑
        async function loadWorldRanking() {
            const content = document.getElementById('rank-content');
            content.innerHTML = '<div class="text-center py-10 text-gray-400 italic">正在计算实时排名...</div>';
            
            try {
                const q = query(collection(db, "users"), orderBy("points", "desc"), limit(10));
                const snap = await getDocs(q);
                content.innerHTML = '';
                
                let i = 1;
                snap.forEach(userDoc => {
                    const data = userDoc.data();
                    const isMe = auth.currentUser && auth.currentUser.uid === data.uid;
                    const item = document.createElement('div');
                    item.className = `flex justify-between items-center p-4 rounded-2xl border ${isMe ? 'bg-blue-50 border-blue-200' : 'bg-white border-gray-100'}`;
                    item.innerHTML = `
                        <div class="flex items-center gap-4">
                            <span class="w-8 h-8 flex items-center justify-center rounded-full font-black ${i <= 3 ? 'rank-gold text-white' : 'bg-gray-100 text-gray-400'}">${i}</span>
                            <span class="font-bold text-gray-700">${data.name}</span>
                        </div>
                        <span class="font-black text-blue-600">${data.points} pts</span>
                    `;
                    content.appendChild(item);
                    i++;
                });

                if(auth.currentUser) {
                    document.getElementById('my-rank-pos').classList.remove('hidden');
                    document.getElementById('my-pts-display').innerText = `${userData.points} pts`;
                }
            } catch (e) {
                content.innerHTML = '<div class="text-red-400 text-center">无法加载排名，请稍后重试。</div>';
            }
        }

        window.switchRank = (type) => {
            const worldBtn = document.getElementById('tab-world');
            const friendBtn = document.getElementById('tab-friends');
            if(type === 'world') {
                worldBtn.className = "pb-2 px-4 border-b-2 border-blue-600 font-bold text-blue-600";
                friendBtn.className = "pb-2 px-4 border-b-2 border-transparent text-gray-400 font-bold";
                loadWorldRanking();
            } else {
                worldBtn.className = "pb-2 px-4 border-b-2 border-transparent text-gray-400 font-bold";
                friendBtn.className = "pb-2 px-4 border-b-2 border-blue-600 font-bold text-blue-600";
                document.getElementById('rank-content').innerHTML = '<div class="text-center py-10 text-gray-400">目前暂无好友动态</div>';
            }
        };

        // 账户交互
        document.getElementById('btn-login').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("登录失败: " + err.message));
        };

        document.getElementById('btn-register').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            createUserWithEmailAndPassword(auth, e, p).then(() => alert("欢迎加入！")).catch(err => alert(err.message));
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        document.getElementById('lang-setting').onchange = async (e) => {
            currentLang = e.target.value;
            if(auth.currentUser) await updateDoc(doc(db, "users", auth.currentUser.uid), { lang: currentLang });
        };
    </script>
</body>
</html>
