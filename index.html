<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuneEnglish - 词汇学习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xs opacity-80">当前等级 / 积分</span>
                <span class="font-bold text-lg"><i class="fas fa-medal"></i> <span id="display-level">A1</span> | <span id="display-points">0</span> pts</span>
            </div>
            <nav class="space-x-4">
                <button onclick="showPage('main')" class="hover:text-blue-200 transition"><i class="fas fa-book"></i> Main</button>
                <button onclick="showPage('account')" class="hover:text-blue-200 transition"><i class="fas fa-user-circle"></i> Account</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-4xl">
        
        <section id="main-page" class="page active space-y-6">
            <div id="level-selector" class="grid grid-cols-3 md:grid-cols-6 gap-2">
                <button onclick="startQuiz('A1')" class="bg-white border-2 border-blue-500 text-blue-500 py-3 rounded-xl font-bold hover:bg-blue-500 hover:text-white transition">A1</button>
                <button onclick="startQuiz('A2')" class="bg-white border-2 border-blue-500 text-blue-500 py-3 rounded-xl font-bold hover:bg-blue-500 hover:text-white transition">A2</button>
                <button onclick="startQuiz('B1')" class="bg-white border-2 border-blue-500 text-blue-500 py-3 rounded-xl font-bold hover:bg-blue-500 hover:text-white transition">B1</button>
                <button onclick="startQuiz('B2')" class="bg-white border-2 border-blue-500 text-blue-500 py-3 rounded-xl font-bold hover:bg-blue-500 hover:text-white transition">B2</button>
                <button onclick="startQuiz('C1')" class="bg-white border-2 border-blue-500 text-blue-500 py-3 rounded-xl font-bold hover:bg-blue-500 hover:text-white transition">C1</button>
                <button onclick="startQuiz('C2')" class="bg-white border-2 border-blue-500 text-blue-500 py-3 rounded-xl font-bold hover:bg-blue-500 hover:text-white transition">C2</button>
            </div>

            <div id="quiz-area" class="hidden glass-card p-6 rounded-2xl shadow-xl border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="current-category" class="text-xl font-bold text-blue-600 underline">C2 Quiz</h2>
                    <span id="progress-text" class="text-sm font-semibold text-gray-500 underline">进度: 0%</span>
                </div>
                
                <div class="text-center mb-8">
                    <p class="text-gray-500 mb-2">请选择正确意思：</p>
                    <h1 id="question-word" class="text-4xl font-extrabold text-gray-800">Loading...</h1>
                </div>

                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    </div>

                <div class="flex flex-col gap-3">
                    <button onclick="handleAnswer(null)" class="w-full py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-medium italic">
                        我不太确定 (+0分)
                    </button>
                    <button onclick="exitQuiz()" class="text-red-500 text-sm hover:underline">退出练习</button>
                </div>
            </div>
        </section>

        <section id="account-page" class="page space-y-6">
            <div id="auth-box" class="glass-card p-8 rounded-2xl shadow-lg border text-center">
                <h2 class="text-2xl font-bold mb-6">欢迎学习英语</h2>
                <div class="space-y-4 max-w-sm mx-auto">
                    <input type="email" id="email" placeholder="邮箱" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="password" id="password" placeholder="密码" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <div class="flex gap-2">
                        <button id="btn-login" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold">登录</button>
                        <button id="btn-register" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold">注册</button>
                    </div>
                    <button id="btn-forget" class="text-blue-500 text-sm">忘记密码？(请检查垃圾邮件箱)</button>
                </div>
            </div>

            <div id="profile-box" class="hidden space-y-6">
                <div class="glass-card p-6 rounded-2xl shadow-md border flex items-center justify-between">
                    <div>
                        <h2 id="user-name" class="text-2xl font-bold text-gray-800">Loading...</h2>
                        <p id="user-id" class="text-blue-500 font-mono">ID: #000000</p>
                    </div>
                    <button id="btn-logout" class="bg-red-50 text-red-500 p-2 rounded-full hover:bg-red-100 transition"><i class="fas fa-sign-out-alt"></i></button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card p-6 rounded-2xl shadow-sm border">
                        <h3 class="font-bold mb-4 text-lg"><i class="fas fa-user-plus"></i> 添加好友</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="search-friend" placeholder="搜索名字或ID" class="flex-1 p-2 border rounded-lg text-sm">
                            <button id="btn-search" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">搜索</button>
                        </div>
                        <div id="search-result" class="hidden p-3 bg-blue-50 rounded-lg flex items-center justify-between mb-4">
                            <div>
                                <span id="found-name" class="font-bold block text-sm"></span>
                                <span id="found-id" class="text-xs text-gray-500"></span>
                            </div>
                            <button id="btn-add-confirm" class="bg-blue-600 text-white px-3 py-1 rounded text-xs">添加</button>
                        </div>
                        <button class="w-full text-left p-3 text-sm border-t hover:bg-gray-50 flex justify-between items-center">
                            <span>好友申请通知</span>
                            <span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full">2</span>
                        </button>
                    </div>

                    <div class="glass-card p-6 rounded-2xl shadow-sm border flex flex-col justify-center gap-4">
                        <button class="w-full bg-yellow-500 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-yellow-600 transition">
                            <i class="fas fa-trophy"></i> 世界排行榜
                        </button>
                        <button class="w-full bg-indigo-500 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-600 transition">
                            <i class="fas fa-users"></i> 好友排行榜
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, increment } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // 配置 (使用你提供的配置)
        const firebaseConfig = {
            apiKey: "AIzaSyDP83fCrgigdbGuBZaUdken3C98ite_VVI",
            authDomain: "juneenglish07-4fe11.firebaseapp.com",
            projectId: "juneenglish07-4fe11",
            storageBucket: "juneenglish07-4fe11.firebasestorage.app",
            messagingSenderId: "186169420975",
            appId: "1:186169420975:web:c3a29d1449a9920d9b785a",
            measurementId: "G-62Y0N40KZZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 核心变量 ---
        let currentUserData = null;
        let currentQuizPool = [];
        let currentLevel = "A1";

        // --- 页面路由逻辑 ---
        window.showPage = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`${pageId}-page`).classList.add('active');
        };

        // --- Firebase Auth 逻辑 ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('profile-box').classList.remove('hidden');
                await syncUserData(user);
            } else {
                document.getElementById('auth-box').classList.remove('hidden');
                document.getElementById('profile-box').classList.add('hidden');
                resetUI();
            }
        });

        async function syncUserData(user) {
            const userRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(userRef);

            if (!docSnap.exists()) {
                // 新用户：生成 100000+ ID
                const newId = Math.floor(100000 + Math.random() * 900000);
                currentUserData = {
                    uid: user.uid,
                    id: newId,
                    name: user.email.split('@')[0],
                    points: 0,
                    progress: { A1: 0, A2: 0, B1: 0, B2: 0, C1: 0, C2: 0 },
                    mastered: []
                };
                await setDoc(userRef, currentUserData);
            } else {
                currentUserData = docSnap.data();
            }
            updateHeader();
            updateProfileUI();
        }

        function updateHeader() {
            document.getElementById('display-points').innerText = currentUserData.points;
            // 简单等级逻辑：每1000分升一级，或手动逻辑
            document.getElementById('display-level').innerText = calculateLevel(currentUserData.points);
        }

        function updateProfileUI() {
            document.getElementById('user-name').innerText = currentUserData.name;
            document.getElementById('user-id').innerText = `ID: #${currentUserData.id}`;
        }

        function calculateLevel(pts) {
            if(pts < 500) return "A1";
            if(pts < 1500) return "A2";
            if(pts < 3000) return "B1";
            return "B2+";
        }

        // --- 测验逻辑 ---
        window.startQuiz = async (category) => {
            currentLevel = category;
            document.getElementById('level-selector').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('current-category').innerText = `${category} Quiz`;
            
            // 模拟对接 Github (实际建议使用 fetch 你稍后生成的 JSON)
            // fetch(`https://raw.githubusercontent.com/你的用户名/repo/main/${category}.json`)
            // 这里暂用模拟数据演示逻辑
            loadNextQuestion();
        };

        window.exitQuiz = () => {
            document.getElementById('level-selector').classList.remove('hidden');
            document.getElementById('quiz-area').classList.add('hidden');
        };

        function loadNextQuestion() {
            // 这里的逻辑会在加载 JSON 后完善
            document.getElementById('question-word').innerText = "Loading...";
            // 逻辑：随机抽取一个词，生成4个错误选项+1个正确选项
        }

        window.handleAnswer = async (isCorrect) => {
            let pointChange = 0;
            if (isCorrect === true) pointChange = 5;
            else if (isCorrect === false) pointChange = -2;
            else pointChange = 0; // 不确定

            if (auth.currentUser) {
                const userRef = doc(db, "users", auth.currentUser.uid);
                await updateDoc(userRef, {
                    points: increment(pointChange)
                });
                currentUserData.points += pointChange;
                updateHeader();
            }
            loadNextQuestion();
        };

        // --- 登录注册事件监听 ---
        document.getElementById('btn-login').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        document.getElementById('btn-register').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        document.getElementById('btn-forget').onclick = () => {
            const e = document.getElementById('email').value;
            if(!e) return alert("请先输入邮箱");
            sendPasswordResetEmail(auth, e).then(() => alert("重置邮件已发送，请检查垃圾邮件箱")).catch(err => alert(err.message));
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        function resetUI() {
            document.getElementById('display-points').innerText = "0";
            document.getElementById('display-level').innerText = "A1";
        }
    </script>
</body>
</html>
